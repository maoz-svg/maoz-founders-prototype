<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAOZ Founders Club — אב-טיפוס</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=David+Libre:wght@400;500;700&family=Heebo:wght@400;500;700&family=Cormorant+Garamond:wght@500;600&family=Space+Grotesk:wght@400;500&family=Pinyon+Script&display=swap" rel="stylesheet">
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
<style>
  :root{
    --green-ink:#0c3a2b; --green:#14533d; --green-deep:#0a241b;
    --cream:#F6F1E3; --cream-soft:#efe8d6; --cream-dim:rgba(246,241,227,0.72);
    --gold:#C6A35B; --gold-2:#caa463;
    --ink:#2a3a33; --ink-dim:#6b7d74; --danger:#b3543f;
    --display:'David Libre', serif;
    --body:'Heebo', sans-serif;
    --serif:'Cormorant Garamond', serif;
    --label:'Space Grotesk', sans-serif;
    --r:22px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:var(--body);
    background:radial-gradient(120% 120% at 50% 0%, #143e2e 0%, #0a221a 55%, #061711 100%);
    min-height:100%; display:flex; flex-direction:column; align-items:center;
    padding:22px 12px 40px; color:var(--ink); overflow-x:hidden;
  }
  .topbar{display:flex; align-items:center; gap:10px; margin-bottom:14px; max-width:430px; width:100%; justify-content:center; flex-wrap:wrap;}
  .brandline{font-family:var(--label); color:var(--gold-2); letter-spacing:3px; font-size:11px; text-align:center;}
  .pillbtn{
    display:inline-flex; align-items:center; gap:6px; cursor:pointer;
    background:rgba(8,30,22,.86); border:1px solid rgba(202,164,99,.5); color:var(--cream);
    padding:7px 13px; border-radius:999px; font-family:var(--body); font-size:12.5px; font-weight:500;
  }
  .pillbtn ion-icon{font-size:15px; color:var(--gold-2);}
  .pillbtn:hover{background:rgba(12,44,32,.95);}

  /* iPhone frame */
  .stage{transform-origin:top center;}
  .device{
    position:relative; width:390px; height:844px;
    background:#0b0b0d; border-radius:56px; padding:14px;
    box-shadow:0 40px 80px -20px rgba(0,0,0,.7), 0 0 0 2px #1d1d20, inset 0 0 0 2px #000;
  }
  .device::after{ /* side buttons hint */
    content:""; position:absolute; left:-3px; top:170px; width:3px; height:64px; background:#15151a; border-radius:3px;
    box-shadow:0 84px 0 #15151a, 0 -120px 0 #15151a;
  }
  .screen{
    position:relative; width:100%; height:100%; background:var(--cream);
    border-radius:44px; overflow:hidden; display:flex; flex-direction:column;
  }
  .notch{position:absolute; top:11px; left:50%; transform:translateX(-50%); width:120px; height:33px; background:#0b0b0d; border-radius:20px; z-index:40;}
  .statusbar{position:absolute; top:0; left:0; right:0; height:50px; z-index:30; display:flex; align-items:center; justify-content:space-between; padding:16px 26px 0; pointer-events:none;}
  .statusbar .t{font-family:var(--label); font-weight:500; font-size:13px;}
  .statusbar .r{display:flex; gap:6px; align-items:center; font-size:13px;}

  .scroll{flex:1; overflow-y:auto; overflow-x:hidden; padding:56px 16px 120px; -webkit-overflow-scrolling:touch;}
  .scroll::-webkit-scrollbar{width:0;}

  /* generic */
  .h1{font-family:var(--display); font-weight:700; font-size:24px; color:var(--green); margin:0; text-align:start;}
  .sub{font-family:var(--body); font-size:13px; color:var(--ink-dim); margin:2px 0 14px; text-align:start;}
  .card{background:rgba(255,255,255,.46); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); border-radius:var(--r); padding:14px; margin-bottom:10px; border:1px solid rgba(255,255,255,.55);}
  .row-rev{display:flex; align-items:center; gap:10px;}
  .between{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .pill{background:rgba(202,164,99,.16); border-radius:999px; padding:3px 10px; font-family:var(--body); font-weight:500; font-size:11px; color:#a8823f; white-space:nowrap;}
  .gold-btn{background:var(--gold); color:var(--green-deep); border:none; border-radius:14px; padding:13px 18px; font-family:var(--body); font-weight:700; font-size:14px; cursor:pointer; width:100%;}
  .soft-btn{background:var(--cream-soft); color:var(--green); border:none; border-radius:14px; padding:13px; font-family:var(--body); font-weight:700; font-size:13px; cursor:pointer; width:100%; display:flex; align-items:center; justify-content:center; gap:6px;}
  .soft-btn ion-icon{font-size:16px;}

  /* header */
  .home-head{display:flex; align-items:center; gap:8px; margin-bottom:18px;}
  .hello{font-size:13px; color:var(--ink-dim); margin:0;}
  .name{font-family:var(--display); font-weight:700; font-size:22px; color:var(--green); margin:0; line-height:1.15;}
  .icbtn{width:42px; height:42px; border-radius:999px; background:#fff; border:1px solid rgba(12,58,43,.08); display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; flex:none;}
  .icbtn ion-icon{font-size:20px; color:var(--green);}
  .icbtn .dot{position:absolute; top:9px; right:10px; width:7px; height:7px; border-radius:50%; background:var(--gold);}
  .avatar{width:42px; height:42px; border-radius:999px; background:var(--green); display:flex; align-items:center; justify-content:center; font-family:var(--display); font-weight:700; color:var(--gold); font-size:14px; flex:none;}

  /* tier hero */
  .tier{position:relative; overflow:hidden; border-radius:var(--r); padding:18px; border:1px solid var(--tac-border); box-shadow:0 16px 34px -12px rgba(12,58,43,.4);
    --tfg:var(--cream); --tdim:var(--cream-dim); --tac:var(--gold); --tac-border:rgba(202,164,99,.5);
    -webkit-backdrop-filter:blur(13px) saturate(1.15); backdrop-filter:blur(13px) saturate(1.15);}
  /* tier-themed metallic finishes — more transparent (glassy) */
  .tier.gold{background:linear-gradient(150deg, rgba(224,189,124,.6), rgba(178,135,62,.48) 52%, rgba(233,206,148,.6)); --tfg:#36290e; --tdim:rgba(54,41,14,.78); --tac:#5e441a; --tac-border:rgba(120,90,40,.5);}
  .tier.silver{background:linear-gradient(150deg, rgba(220,224,227,.58), rgba(168,176,182,.46) 52%, rgba(236,239,242,.58)); --tfg:#272d32; --tdim:rgba(39,45,50,.76); --tac:#525c65; --tac-border:rgba(120,130,138,.5);}
  .tier.platinum{background:linear-gradient(150deg, rgba(40,40,46,.72), rgba(8,8,10,.64) 52%, rgba(54,54,62,.72)); --tfg:#f1ead7; --tdim:rgba(241,234,215,.74); --tac:#cBA463; --tac-border:rgba(202,164,99,.5);}
  /* subtle metallic sheen */
  .tier::after{content:""; position:absolute; inset:0; background:linear-gradient(120deg, rgba(255,255,255,.16) 0%, transparent 32%, transparent 68%, rgba(255,255,255,.1) 100%); pointer-events:none;}
  .tier>*{position:relative; z-index:1;}
  .tier .club{font-family:var(--label); font-size:10px; letter-spacing:2px; color:var(--tdim); font-weight:500;}
  .tier .club, .tier .tname, .tier .since, .tier .badge{text-shadow:0 1px 1.5px rgba(0,0,0,.16);}
  .tier .badge{display:inline-flex; align-items:center; gap:4px; border:1px solid var(--tac); border-radius:999px; padding:3px 10px; color:var(--tac); font-family:var(--label); font-size:12px; letter-spacing:1.5px;}
  .tier .badge ion-icon{color:var(--tac);}
  .tier .tname{font-family:var(--display); font-weight:700; font-size:27px; color:var(--tfg); margin:26px 0 0; text-align:start;}
  .tier .since{font-size:12px; color:var(--tdim);}
  .tier .mono{width:40px; height:40px; opacity:.55; background-color:var(--tac);
    -webkit-mask:url(maoz-app/assets/brand/maoz-m.png) center/contain no-repeat;
    mask:url(maoz-app/assets/brand/maoz-m.png) center/contain no-repeat;}

  /* balance */
  .bal-label{font-size:13px; color:var(--ink-dim); margin:0; text-align:start;}
  .bal-val{font-family:var(--display); font-weight:700; font-size:27px; color:var(--green); margin:2px 0 0; text-align:start;}

  /* quick grid */
  .qgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:9px; margin-top:16px;}
  .qa{background:rgba(255,255,255,.46); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); border-radius:16px; padding:13px 6px; border:1px solid rgba(255,255,255,.55); display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; text-align:center;}
  .qa:active{transform:scale(.97);}
  .qa .ic{width:46px; height:46px; border-radius:999px; background:#fff; border:1px solid rgba(12,58,43,.08); display:flex; align-items:center; justify-content:center;}
  .qa .ic ion-icon{font-size:22px; color:var(--green-ink);}
  .qa .lbl{font-family:var(--body); font-weight:700; font-size:11.5px; color:var(--green-ink); line-height:1.25;}

  .sec-head{display:flex; align-items:center; justify-content:space-between; margin:22px 0 8px;}
  .sec-title{font-family:var(--display); font-weight:700; font-size:18px; color:var(--green);}
  .sec-link{font-family:var(--body); font-weight:500; font-size:13px; color:var(--gold); cursor:pointer;}

  .proj-name{font-family:var(--display); font-weight:700; font-size:16px; color:var(--green); margin:0; text-align:start;}
  .proj-loc{font-size:12px; color:var(--ink-dim); margin:3px 0 0; display:flex; align-items:center; gap:3px; text-align:start;}
  .proj-loc ion-icon{font-size:13px;}
  .proj-upd{font-size:13px; color:var(--ink); margin:10px 0 0; line-height:1.55; text-align:start;}
  .proj-foot{display:flex; align-items:center; justify-content:space-between; margin-top:10px;}
  .proj-inv{font-size:13px; color:var(--ink-dim);}
  .proj-inv b{font-weight:700; color:var(--green);}
  .proj-date{font-family:var(--label); font-size:11px; color:var(--ink-dim);}

  .new-card{display:flex; align-items:center; justify-content:space-between; gap:8px; background:rgba(255,255,255,.46); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); border-radius:16px; padding:14px; margin-bottom:10px; border:1px solid rgba(202,164,99,.3); cursor:pointer;}
  .new-meta{font-size:11.5px; color:var(--ink-dim); margin:4px 0 0; text-align:start;}
  .new-card>ion-icon{font-size:20px; color:var(--gold); flex:none;}

  /* events */
  .ev-card{background:rgba(255,255,255,.46); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); border-radius:var(--r); padding:14px; margin-bottom:10px; border:1px solid rgba(255,255,255,.55);}
  .ev-date{display:inline-flex; align-items:center; gap:5px; background:var(--green); color:var(--cream); border-radius:999px; padding:4px 11px; font-family:var(--label); font-size:11.5px; margin-bottom:9px;}
  .ev-date ion-icon{font-size:13px; color:var(--gold-2);}
  .ev-title{font-family:var(--display); font-weight:700; font-size:17px; color:var(--green); margin:0; text-align:start;}
  .ev-where{font-size:12.5px; color:var(--ink-dim); margin:5px 0 12px; display:flex; align-items:center; gap:4px; text-align:start;}
  .ev-where ion-icon{font-size:14px;}
  .ev-btn{background:var(--gold); color:var(--green-deep); border:none; border-radius:12px; padding:11px; font-family:var(--body); font-weight:700; font-size:13px; cursor:pointer; width:100%;}
  .ev-btn.done{background:var(--cream-soft); color:var(--green);}

  /* benefits */
  .perk{background:var(--green); border-radius:var(--r); padding:18px; margin-bottom:16px; border:1px solid rgba(202,164,99,.4);}
  .perk-head{display:flex; align-items:center; gap:6px; margin-bottom:10px; color:var(--gold); font-weight:700; font-size:13px;}
  .perk-row{display:flex; align-items:center; gap:8px; margin-top:7px; color:var(--cream); font-size:13px; text-align:start;}
  .perk-row ion-icon{font-size:16px; color:var(--gold); flex:none;}
  .section{font-family:var(--display); font-weight:700; font-size:16px; color:var(--green); margin:18px 0 8px; text-align:start;}
  .group{background:rgba(255,255,255,.46); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); border-radius:var(--r); border:1px solid rgba(255,255,255,.55); overflow:hidden;}
  .svc{display:flex; align-items:center; gap:11px; padding:12px 14px; border-bottom:1px solid rgba(12,58,43,.05);}
  .svc:last-child{border-bottom:none;}
  .svc .ic{width:42px; height:42px; border-radius:999px; background:#fff; border:1px solid rgba(12,58,43,.08); display:flex; align-items:center; justify-content:center; flex:none;}
  .svc .ic ion-icon{font-size:20px; color:var(--green-ink);}
  .svc .nm{flex:1; font-family:var(--body); font-weight:500; font-size:13px; color:var(--green); text-align:start;}
  .svc .nm.lock{color:var(--ink-dim);}
  .svc .locknote{font-size:11px; color:var(--ink-dim); margin-top:2px;}
  .req{background:var(--gold); color:var(--green-deep); border:none; border-radius:999px; padding:7px 15px; font-family:var(--body); font-weight:700; font-size:13px; cursor:pointer;}
  .lock-ic{font-size:16px; color:#b9b3a2;}

  /* documents */
  .doc{display:flex; align-items:center; gap:11px; padding:12px 14px; border-bottom:1px solid rgba(12,58,43,.05); cursor:pointer;}
  .doc:last-child{border-bottom:none;}
  .doc .ic{width:40px; height:40px; border-radius:12px; background:#fff; border:1px solid rgba(12,58,43,.08); display:flex; align-items:center; justify-content:center; flex:none;}
  .doc .ic ion-icon{font-size:18px; color:var(--green-ink);}
  .doc .nm{flex:1; font-family:var(--body); font-weight:500; font-size:13px; color:var(--green); text-align:start;}
  .doc .dt{font-family:var(--label); font-size:11px; color:var(--ink-dim); margin-top:2px;}
  .doc>ion-icon{font-size:20px; color:var(--gold); flex:none;}

  /* profile */
  .pcard{background:rgba(255,255,255,.46); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); border-radius:var(--r); padding:20px; display:flex; flex-direction:column; align-items:center; border:1px solid rgba(202,164,99,.3);}
  .pcard .av{width:72px; height:72px; border-radius:999px; background:var(--green); display:flex; align-items:center; justify-content:center; font-family:var(--display); font-weight:700; color:var(--gold); font-size:22px;}
  .pcard .nm{font-family:var(--display); font-weight:700; font-size:22px; color:var(--green); margin:10px 0 0;}
  .pcard .ph{font-family:var(--label); font-size:13px; color:var(--ink-dim); margin:2px 0 0;}
  .pcard .bd{display:inline-flex; align-items:center; gap:5px; background:rgba(202,164,99,.16); border-radius:999px; padding:5px 12px; margin-top:10px; color:#a8823f; font-weight:700; font-size:13px;}
  .fee{display:flex; align-items:center; justify-content:space-between; background:rgba(255,255,255,.46); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px); border-radius:16px; padding:14px; margin-top:12px; border:1px solid rgba(255,255,255,.55);}
  .fee .l{font-size:13px; color:var(--ink-dim);}
  .fee .v{font-family:var(--display); font-weight:700; font-size:18px; color:var(--green);}
  .prow{display:flex; align-items:center; gap:11px; padding:14px; border-bottom:1px solid rgba(12,58,43,.05); cursor:pointer;}
  .prow:last-child{border-bottom:none;}
  .prow .ic{width:38px; height:38px; border-radius:12px; background:#fff; border:1px solid rgba(12,58,43,.08); display:flex; align-items:center; justify-content:center; flex:none;}
  .prow .ic ion-icon{font-size:18px; color:var(--green-ink);}
  .prow .l{flex:1; font-family:var(--body); font-weight:500; font-size:14px; color:var(--green); text-align:start;}
  .prow>ion-icon{font-size:18px; color:var(--ink-dim);}
  .logout{display:flex; align-items:center; justify-content:center; gap:8px; margin-top:18px; padding:15px; border-radius:14px; border:1px solid rgba(179,84,63,.3); background:none; color:var(--danger); font-family:var(--body); font-weight:700; font-size:14px; cursor:pointer; width:100%;}

  .back{display:inline-flex; align-items:center; gap:5px; background:none; border:none; color:var(--green); font-family:var(--body); font-weight:500; font-size:13px; cursor:pointer; padding:0; margin-bottom:8px;}
  .back ion-icon{font-size:17px;}

  /* ===== opening sequence (real flow) ===== */
  .opening{position:absolute; inset:0; z-index:60; overflow:hidden; border-radius:44px;}
  .login-lang{position:absolute; top:52px; inset-inline-end:16px; z-index:8;}
  .skip{position:absolute; top:54px; inset-inline-start:16px; z-index:8; background:rgba(0,0,0,.18); border:none; color:var(--cream); font-family:var(--body); font-size:12.5px; padding:6px 14px; border-radius:999px; cursor:pointer; backdrop-filter:blur(4px);}
  .opening.at-card .skip{display:none;}

  /* phase 1 — deep green intro */
  .intro-green{position:absolute; inset:0; background:#0a241b; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:3; transition:opacity .7s ease; opacity:1;}
  .opening.cream .intro-green{opacity:0; pointer-events:none;}
  .mg-logo{width:44%; max-width:190px; height:auto; opacity:0;}
  .opening.play .mg-logo{animation:mgFade 1.5s ease .5s forwards;}
  @keyframes mgFade{from{opacity:0; transform:scale(.99);} to{opacity:1; transform:scale(1);}}
  .mg-tag{display:flex; align-items:center; gap:7px; margin-top:14px;}
  .mg-tag .w{font-family:var(--serif); font-size:13px; color:#d8b46a; letter-spacing:.5px; clip-path:inset(0 0 0 100%); opacity:0;}
  .mg-tag[dir="ltr"] .w{clip-path:inset(0 100% 0 0);}
  .opening.play .mg-tag .w{animation:writeWord .6s ease forwards;}
  @keyframes writeWord{to{clip-path:inset(0 0 0 0); opacity:1;}}
  .mg-tag .dot{font-family:var(--serif); font-size:13px; color:#d8b46a; opacity:0;}
  .opening.play .mg-tag .dot{animation:fadeIn .3s ease forwards;}
  .mg-tag .rule{width:26px; height:1px; background:linear-gradient(90deg,transparent,#d8b46a,transparent); opacity:0;}
  .opening.play .mg-tag .rule{animation:fadeIn .65s ease 2.6s forwards;}
  @keyframes fadeIn{to{opacity:1;}}

  /* phase 2/3 — club cream + video + login card */
  .club-cream{position:absolute; inset:0; background:#F3EFE4; z-index:2;}
  .rise-logo{position:absolute; inset:0; width:100%; height:100%; object-fit:contain; transform:translateY(0); transition:transform .9s cubic-bezier(.5,0,.2,1);}
  .opening.at-card .rise-logo{transform:translateY(-28%);}
  .club-video{position:absolute; inset:0; width:100%; height:100%; object-fit:contain; background:#F3EFE4; opacity:1; transition:opacity .4s ease; z-index:4;}
  .opening.video-done .club-video{opacity:0; pointer-events:none;}

  .login-card{position:absolute; left:16px; right:16px; bottom:11%; z-index:6;
    background:rgba(8,28,21,.72); border:1px solid rgba(202,164,99,.55); border-radius:var(--r);
    padding:20px 18px; box-shadow:0 16px 40px -12px rgba(58,51,32,.5);
    transform:translateY(60%); opacity:0; transition:transform .85s cubic-bezier(.5,0,.15,1), opacity .6s ease;}
  .opening.at-card .login-card{transform:translateY(0); opacity:1;}
  .login-card h2{font-family:var(--display); font-weight:700; color:var(--cream); font-size:18px; margin:0; text-align:center;}
  .login-card .note{font-family:var(--body); font-size:12.5px; color:var(--cream-dim); text-align:center; margin:6px 0 0; line-height:1.6;}
  .login-card .note b{color:var(--cream); font-weight:700;}
  .lc-inputrow{display:flex; gap:9px; margin-top:16px; flex-direction:row; direction:ltr;}
  .prefix{height:52px; padding:0 13px; display:flex; align-items:center; justify-content:center; border-radius:13px; border:1px solid rgba(202,164,99,.38); background:rgba(246,241,227,.1); color:var(--cream); font-family:var(--body); font-weight:500; font-size:15px; flex:none;}
  .lc-input{flex:1; min-width:0; height:52px; padding:0 14px; border-radius:13px; border:1px solid rgba(202,164,99,.38); background:rgba(246,241,227,.1); color:var(--cream); font-family:var(--body); font-size:16px; outline:none; letter-spacing:1px; text-align:left;}
  .lc-input::placeholder{color:rgba(246,241,227,.45);}
  .otp-row{display:flex; gap:8px; margin-top:16px; direction:ltr;}
  .otp-box{flex:1; min-width:0; height:56px; border-radius:13px; border:1px solid rgba(202,164,99,.38); background:rgba(246,241,227,.1); color:var(--cream); font-family:var(--display); font-weight:700; font-size:22px; text-align:center; outline:none;}
  .otp-box:focus{border-color:var(--gold); background:rgba(202,164,99,.18);}
  .lc-btn{width:100%; height:52px; margin-top:16px; border:none; border-radius:14px; background:var(--gold); color:var(--green-deep); font-family:var(--body); font-weight:700; font-size:15px; letter-spacing:.5px; cursor:pointer;}
  .lc-btn:active{transform:scale(.99);}

/* ---------- opening sequence (MAOZ GROUP intro → club video → login) ---------- */
let openTimers = [];
function clearOpenTimers(){ openTimers.forEach(clearTimeout); openTimers = []; }
const later = (fn,ms)=> openTimers.push(setTimeout(fn,ms));

function buildTagline(){
  const dir = LANGS[state.lang].dir;
  const words = L(UI.loginTag).split(' · ');
  const tag = document.getElementById('mgTag');
  tag.setAttribute('dir', dir);
  document.getElementById('skipBtn').textContent = t('skip');
  let html = `<span class="rule" style="animation-delay:4.2s"></span>`;
  words.forEach((w,i)=>{
    if(i>0) html += `<span class="dot" style="animation-delay:${(2.2+i*0.7-0.15).toFixed(2)}s">·</span>`;
    html += `<span class="w" style="animation-delay:${(2.2+i*0.7).toFixed(2)}s">${w}</span>`;
  });
  html += `<span class="rule" style="animation-delay:4.2s"></span>`;
  tag.innerHTML = html;
}

function loginCardHTML(){
  const dir = LANGS[state.lang].dir;
  const phone = state.phone || member.phone;
  if(state.loginStep === 'code'){
    return `
      <button class="lc-back" onclick="backToPhone()"><ion-icon name="chevron-${dir==='rtl'?'forward':'back'}"></ion-icon>${t('loginChange')}</button>
      <h2>${t('loginCodeTitle')}</h2>
      <p class="note">${t('loginCodeNote')}<br><b>+972 ${phone}</b></p>
      <div class="otp-row">${[0,1,2,3,4,5].map((i)=>`<input class="otp-box" maxlength="1" inputmode="numeric" oninput="otpNext(this,${i})">`).join('')}</div>
      <button class="lc-btn" onclick="doLogin()">${t('loginEnter')}</button>
      <button class="lc-resend" onclick="toast(t('tCodeSent'))">${t('loginResend')}</button>
      <div class="lc-foot"><ion-icon name="lock-closed"></ion-icon>${t('loginSecure')}</div>`;
  }
  return `
    <h2>${t('loginTitle')}</h2>
    <p class="note">${t('loginNote')}</p>
    <div class="lc-inputrow">
      <div class="prefix">+972</div>
      <input id="lcPhone" class="lc-input" type="tel" inputmode="tel" placeholder="${t('loginPhone')}" value="${state.phone}">
    </div>
    <button class="lc-btn" onclick="sendCode()">${t('loginSend')}</button>
    <div class="lc-foot"><ion-icon name="lock-closed"></ion-icon>${t('loginSecure')}</div>`;
}
function renderLoginCard(){
  const card = document.getElementById('loginCard');
  card.setAttribute('dir', LANGS[state.lang].dir);
  card.innerHTML = loginCardHTML();
}
function otpNext(el,i){
  el.value = el.value.replace(/\D/g,'').slice(0,1);
  if(el.value && i<5){ const n = el.parentElement.children[i+1]; if(n) n.focus(); }
}
function backToPhone(){ state.loginStep='phone'; renderLoginCard(); }
function sendCode(){
  const el = document.getElementById('lcPhone');
  state.phone = (el && el.value.trim()) ? el.value.trim() : member.phone;
  state.loginStep = 'code';
  renderLoginCard();
  toast(t('tCodeSent'));
}
function revealCard(){
  const op = document.getElementById('opening');
  const v = document.getElementById('clubVideo'); try{ v.pause(); }catch(e){}
  op.classList.add('video-done','at-card');
}
function startOpening(skipGreen){
  clearOpenTimers();
  const op = document.getElementById('opening');
  state.loginStep = 'phone';
  buildTagline();
  renderLoginCard();
  op.style.display = 'block';
  op.className = 'opening'; // reset
  // restart CSS animations
  void op.offsetWidth;
  document.documentElement.lang = state.lang;
  const v = document.getElementById('clubVideo');
  if(skipGreen){
    op.classList.add('play','cream','at-card');
    try{ v.currentTime = 1e6; }catch(e){}
    return;
  }
  op.classList.add('play');
  // words+rules settle ~4.85s; linger ~3s on the MAOZ GROUP screen, then hand off to cream + start video.
  later(()=>{
    op.classList.add('cream');
    try{
      v.currentTime = 0;
      const p = v.play();
      if(p && p.catch) p.catch(()=>{ later(revealCard, 1000); }); // autoplay blocked → reveal shortly
    }catch(e){ later(revealCard, 1000); }
  }, 7800);
  // Let the ~10.8s writing video FINISH, hold ~2.5s, then rise + bring in the card.
  v.onended = ()=> later(revealCard, 2500);
  // Ultimate fallback only if 'ended' is missed (cream@7.8s + ~10.8s video + 2.5s hold + buffer).
  later(revealCard, 22500);
}
function skipIntro(){
  clearOpenTimers();
  const op = document.getElementById('opening');
  const v = document.getElementById('clubVideo'); try{ v.pause(); }catch(e){}
  op.classList.add('play','cream','video-done','at-card');
}
function doLogin(){
  clearOpenTimers();
  const op = document.getElementById('opening');
  op.style.display = 'none';
  state.screen = 'home';
  state.loginStep = 'phone';
  render();
}
function openingVisible(){ const op=document.getElementById('opening'); return op && op.style.display!=='none'; }

/* ---------- tab bar ---------- */
const TABS = [
  {id:`home`, icon:`home`},
  {id:`invest`, icon:`trending-up`},
  {id:`docs`, icon:`document-text`},
  {id:`benefits`, icon:`diamond`},
  {id:`profile`, icon:`person`},
];
function activeTab(){ return state.screen==='events' ? 'home' : state.screen; }
function renderTabs(){
  const at = activeTab();
  const order = state.lang==='he' ? [...TABS].reverse() : TABS;
  document.getElementById('tabbar').innerHTML = order.map((tb)=>`
    <div class="tab ${tb.id===at?'active':''}" onclick="go('${tb.id}')">
      <div class="w"><ion-icon name="${tb.id===at?tb.icon:tb.icon+'-outline'}"></ion-icon></div>
    </div>`).join(``);
}

/* ---------- render / nav ---------- */
const SCREENS = {home:homeScreen, invest:investScreen, events:eventsScreen, docs:docsScreen, benefits:benefitsScreen, profile:profileScreen};
function render(){
  const screen = document.getElementById('screen');
  screen.setAttribute('dir', LANGS[state.lang].dir);
  document.documentElement.lang = state.lang;
  document.getElementById('scroll').innerHTML = SCREENS[state.screen]();
  document.getElementById('scroll').scrollTop = 0;
  renderTabs();
  document.getElementById('statusBtnLabel').textContent = t('statusBtn');
}
function go(s){ state.screen = s; render(); }

/* ---------- language ---------- */
function openLang(){
  document.getElementById('langTitle').textContent = t('langTitle');
  document.getElementById('langList').innerHTML = Object.keys(LANGS).map((code)=>`
    <div class="lang-opt ${code===state.lang?'sel':''}" onclick="setLang('${code}')">
      <span class="flag">${LANGS[code].flag}</span>
      <span class="ln">${LANGS[code].name}</span>
      ${code===state.lang?`<ion-icon class="chk" name="checkmark-circle"></ion-icon>`:``}
    </div>`).join(``);
  document.getElementById('langOverlay').classList.add('show');
}
function closeLang(){ document.getElementById('langOverlay').classList.remove('show'); }
function setLang(code){
  state.lang = code; closeLang();
  render();
  if(openingVisible()){ buildTagline(); renderLoginCard(); document.getElementById('mgTag').setAttribute('dir', LANGS[code].dir); }
}

/* ---------- events / toast ---------- */
function registerEvent(i){ state.reg[i] = !state.reg[i]; if(state.reg[i]) toast(t('tRegistered')); render(); }
let toastTimer;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2600);
}

/* ---------- scale to fit ---------- */
function fit(){
  const stage = document.getElementById('stage');
  const s = Math.min(1, (window.innerHeight-150)/844, (window.innerWidth-24)/390);
  stage.style.transform = `scale(${s<0.4?0.4:s})`;
}
window.addEventListener('resize', fit);

function logout(){ startOpening(true); toast(t('tLogout')); }

/* expose */
Object.assign(window,{go,openLang,closeLang,setLang,toast,t,registerEvent,openInfo,closeInfo,sendCode,doLogin,logout,skipIntro,otpNext,backToPhone,startOpening});

/* optional deep-link: ?screen=events&lang=en  ·  ?skip (straight to app)  ·  ?open=green|card (freeze a phase) */
let _skipOpening = false, _openFreeze = null;
try{
  const q = new URLSearchParams(location.search);
  const ls = q.get('lang'); if(ls && LANGS[ls]) state.lang = ls;
  const tr = q.get('tier'); if(tr && ['silver','gold','platinum'].includes(tr.toLowerCase())) member.tier = tr.toUpperCase();
  const sc = q.get('screen'); if(sc && SCREENS[sc]){ state.screen = sc; _skipOpening = true; }
  if(q.has('skip') || q.has('nointro')) _skipOpening = true;
  _openFreeze = q.get('open'); // 'green' | 'card'
}catch(e){}

render();

if(_openFreeze === 'green'){
  buildTagline(); renderLoginCard();
  document.getElementById('opening').classList.add('play');
} else if(_openFreeze === 'card'){
  startOpening(true);
} else if(_skipOpening){
  document.getElementById('opening').style.display = 'none';
} else {
  startOpening(false);
}

fit();
</script>
